<!-- COPILOT: Build a real-time CallGiant call center dashboard frontend -->

<!-- REQUIREMENTS:
1. Single-page app (no frameworks for now)
2. Connect to backend using Socket.io client
3. Show:
   - Live call queue list
   - Active calls
   - Available agents
4. Buttons:
   - "Start Call" (adds dummy caller to queue)
   - "End Call"
   - "Go Available" (agent status toggle)
5. Real-time updates:
   - queue:update
   - call:assigned
   - call:ended
   - agent:status
6. UI must be clean and simple (basic HTML + CSS only)
7. Must connect to:
   http://localhost:3000 (or env backend port)
8. Include socket.io client CDN

END GOAL:
A working live dashboard that updates instantly when backend queue changes.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CallGiant — Live Dashboard</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f1117;
      color: #e1e4ea;
      min-height: 100vh;
    }

    header {
      background: #161922;
      border-bottom: 1px solid #2a2d38;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #4f9cf7;
    }

    header .status {
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 12px;
      background: #1e3a2f;
      color: #4ade80;
    }

    header .status.disconnected {
      background: #3a1e1e;
      color: #f87171;
    }

    .controls {
      display: flex;
      gap: 10px;
      padding: 16px 24px;
      background: #161922;
      border-bottom: 1px solid #2a2d38;
    }

    button {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    .btn-start { background: #4f9cf7; color: #fff; }
    .btn-end   { background: #f87171; color: #fff; }
    .btn-agent { background: #a78bfa; color: #fff; }

    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      padding: 24px;
    }

    @media (max-width: 900px) {
      .dashboard { grid-template-columns: 1fr; }
    }

    .panel {
      background: #161922;
      border: 1px solid #2a2d38;
      border-radius: 10px;
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 16px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #2a2d38;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-header .badge {
      background: #2a2d38;
      color: #94a3b8;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.7rem;
    }

    .panel-body {
      padding: 8px;
      max-height: 400px;
      overflow-y: auto;
    }

    .card {
      background: #1c1f2b;
      border: 1px solid #2a2d38;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card:last-child { margin-bottom: 0; }

    .card-info h3 {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .card-info p {
      font-size: 0.75rem;
      color: #6b7280;
    }

    .tag {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .tag-queued   { background: #1e3a5f; color: #60a5fa; }
    .tag-active   { background: #1e3a2f; color: #4ade80; }
    .tag-available { background: #1e3a2f; color: #4ade80; }
    .tag-busy     { background: #3a2a1e; color: #fbbf24; }

    .empty {
      text-align: center;
      padding: 24px;
      color: #4b5563;
      font-size: 0.8rem;
    }

    .card .btn-end-small {
      padding: 4px 10px;
      font-size: 0.7rem;
      background: #f87171;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }

    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
    }

    .toast {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
    }

    .toast-info    { background: #1e3a5f; color: #60a5fa; }
    .toast-success { background: #1e3a2f; color: #4ade80; }
    .toast-error   { background: #3a1e1e; color: #f87171; }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    @keyframes fadeOut {
      to { opacity: 0; }
    }
  </style>
</head>
<body>

  <header>
    <h1>&#9889; CallGiant</h1>
    <span class="status disconnected" id="connStatus">Disconnected</span>
  </header>

  <div class="controls">
    <button class="btn-start" id="btnStartCall">&#128222; Start Call</button>
    <button class="btn-agent" id="btnRegisterAgent">&#129333; Register as Agent</button>
  </div>

  <div class="dashboard">
    <!-- Queue Panel -->
    <div class="panel">
      <div class="panel-header">
        Call Queue <span class="badge" id="queueCount">0</span>
      </div>
      <div class="panel-body" id="queueList">
        <div class="empty">No calls in queue</div>
      </div>
    </div>

    <!-- Active Calls Panel -->
    <div class="panel">
      <div class="panel-header">
        Active Calls <span class="badge" id="activeCount">0</span>
      </div>
      <div class="panel-body" id="activeList">
        <div class="empty">No active calls</div>
      </div>
    </div>

    <!-- Agents Panel -->
    <div class="panel">
      <div class="panel-header">
        Agents <span class="badge" id="agentCount">0</span>
      </div>
      <div class="panel-body" id="agentList">
        <div class="empty">No agents connected</div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toasts"></div>

  <script src="app.js"></script>
</body>
</html>
